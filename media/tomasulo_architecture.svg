<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 770" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" role="img" aria-labelledby="t d">
  <title id="t">Tomasulo Out-of-Order RISC-V CPU &#8212; block diagram</title>
  <desc id="d">Five-stage Tomasulo pipeline: Fetch (pc_gen, instr_mem, IFQ), Issue/Rename (decoder, dispatch, RAT, register file, ROB, reservation station), Execute (ALU, branch unit, stubbed LSU), Write-back via Common Data Bus, and in-order commit from the ROB head back to the register file. CDB broadcasts results back to the RS for snooping, the ROB for value-write, and clears matching RAT entries. A misprediction loop returns the corrected PC from the branch unit to pc_gen.</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#111"/>
    </marker>
    <marker id="arrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <style>
    .title       { font-size: 14px; font-weight: 600; fill: #111; }
    .stage       { font-size: 11px; font-weight: 600; letter-spacing: 0.10em; fill: #666; }
    .modname     { font-size: 13px; font-weight: 600; fill: #111; }
    .modsub      { font-size: 10.5px; fill: #666; }
    .signal      { font-size: 9.5px; fill: #666; }
    .signal-em   { font-size: 9.5px; fill: #111; font-weight: 600; }
    .commit      { font-size: 11px; fill: #111; }
    .modbox      { fill: #fff; stroke: #111; stroke-width: 1.5; }
    .ghostbox    { fill: #fff; stroke: #999; stroke-width: 1.5; stroke-dasharray: 4 3; }
    .ghosttext   { fill: #999; }
    .cdbbox      { fill: #111; stroke: #111; stroke-width: 1; }
    .cdbtext     { fill: #fff; font-size: 12px; font-weight: 600; letter-spacing: 0.04em; }
    .cdbsub      { fill: #fff; font-size: 10.5px; opacity: 0.85; }
    .arrow       { fill: none; stroke: #111; stroke-width: 1.2; }
    .arrow-cdb   { fill: none; stroke: #111; stroke-width: 1.4; stroke-dasharray: 5 3; }
    .arrow-recov { fill: none; stroke: #666; stroke-width: 1.2; stroke-dasharray: 4 3; }
    .divider     { stroke: #e5e5e5; stroke-width: 1; }
  </style>

  <text x="400" y="24" text-anchor="middle" class="title">Tomasulo Out-of-Order RISC-V CPU</text>
  <text x="400" y="40" text-anchor="middle" class="modsub">RV32I &#183; 8-entry RS &#183; 16-entry ROB &#183; 32-entry RAT &#183; Sky130 ASIC flow</text>

  <text x="45" y="65" class="stage">1 &#183; FETCH</text>

  <g>
    <rect class="modbox" x="75"  y="78" width="140" height="55" rx="4"/>
    <text x="145" y="100" text-anchor="middle" class="modname">pc_gen</text>
    <text x="145" y="118" text-anchor="middle" class="modsub">PC + branch recovery</text>
  </g>
  <g>
    <rect class="modbox" x="235" y="78" width="120" height="55" rx="4"/>
    <text x="295" y="100" text-anchor="middle" class="modname">instr_mem</text>
    <text x="295" y="118" text-anchor="middle" class="modsub">RV32I ROM</text>
  </g>
  <g>
    <rect class="modbox" x="375" y="78" width="190" height="55" rx="4"/>
    <text x="470" y="100" text-anchor="middle" class="modname">IFQ &#183; FIFO</text>
    <text x="470" y="118" text-anchor="middle" class="modsub">{instr, pc} &#183; stop_fetch on NOP</text>
  </g>

  <line class="arrow" x1="215" y1="105" x2="234" y2="105" marker-end="url(#arr)"/>
  <text x="225" y="100" text-anchor="middle" class="signal">addr</text>
  <line class="arrow" x1="355" y1="105" x2="374" y2="105" marker-end="url(#arr)"/>
  <text x="365" y="100" text-anchor="middle" class="signal">instr</text>

  <line class="divider" x1="30" y1="156" x2="770" y2="156"/>

  <text x="45" y="175" class="stage">2 &#183; ISSUE &amp; RENAME</text>

  <g>
    <rect class="modbox" x="75"  y="190" width="180" height="50" rx="4"/>
    <text x="165" y="210" text-anchor="middle" class="modname">decoder</text>
    <text x="165" y="227" text-anchor="middle" class="modsub">rs1 &#183; rs2 &#183; rd &#183; imm &#183; funct3/7 &#183; opcode</text>
  </g>
  <g>
    <rect class="modbox" x="275" y="190" width="200" height="50" rx="4"/>
    <text x="375" y="210" text-anchor="middle" class="modname">dispatch</text>
    <text x="375" y="227" text-anchor="middle" class="modsub">allocate ROB+RS &#183; RAT write</text>
  </g>

  <path class="arrow" d="M 470 133 V 165 H 165 V 189" marker-end="url(#arr)"/>

  <line class="arrow" x1="255" y1="215" x2="274" y2="215" marker-end="url(#arr)"/>

  <path class="arrow" d="M 165 240 V 256 H 330 V 267" marker-end="url(#arr)"/>
  <path class="arrow" d="M 165 256 V 267" marker-end="url(#arr)"/>
  <text x="252" y="252" text-anchor="middle" class="signal">rs1, rs2, rd</text>

  <path class="arrow" d="M 375 240 V 256 H 500 V 267" marker-end="url(#arr)"/>
  <text x="445" y="252" text-anchor="middle" class="signal-em">rob_tail (rename)</text>

  <g>
    <rect class="modbox" x="75"  y="268" width="170" height="70" rx="4"/>
    <text x="160" y="289" text-anchor="middle" class="modname">RAT</text>
    <text x="160" y="306" text-anchor="middle" class="modsub">Register Alias Table</text>
    <text x="160" y="322" text-anchor="middle" class="modsub">32 entries &#183; arch reg &#8594; ROB tag</text>
  </g>
  <g>
    <rect class="modbox" x="265" y="268" width="130" height="70" rx="4"/>
    <text x="330" y="289" text-anchor="middle" class="modname">Register File</text>
    <text x="330" y="306" text-anchor="middle" class="modsub">32 &#215; 32-bit</text>
    <text x="330" y="322" text-anchor="middle" class="modsub">2R / 1W</text>
  </g>
  <g>
    <rect class="modbox" x="415" y="268" width="170" height="70" rx="4"/>
    <text x="500" y="289" text-anchor="middle" class="modname">ROB</text>
    <text x="500" y="306" text-anchor="middle" class="modsub">Reorder Buffer</text>
    <text x="500" y="322" text-anchor="middle" class="modsub">16 entries &#183; in-order commit</text>
  </g>

  <line class="arrow" x1="414" y1="305" x2="396" y2="305" marker-end="url(#arr)"/>
  <text x="405" y="298" text-anchor="middle" class="signal-em">commit</text>

  <g>
    <rect class="modbox" x="75"  y="358" width="510" height="65" rx="4"/>
    <text x="330" y="380" text-anchor="middle" class="modname">Reservation Station &#183; 8 slots</text>
    <text x="330" y="397" text-anchor="middle" class="modsub">{op, opcode, vj, vk, qj, qk, imm, rob_tag}</text>
    <text x="330" y="413" text-anchor="middle" class="modsub">issue when (qj=0 &#8743; qk=0) &#183; CDB snoop fills vj/vk</text>
  </g>

  <line class="arrow" x1="160" y1="338" x2="160" y2="357" marker-end="url(#arr)"/>
  <text x="168" y="352" text-anchor="start" class="signal">qj/qk &#183; valid</text>
  <line class="arrow" x1="330" y1="338" x2="330" y2="357" marker-end="url(#arr)"/>
  <text x="338" y="352" text-anchor="start" class="signal">vj, vk</text>
  <line class="arrow" x1="500" y1="338" x2="500" y2="357" marker-end="url(#arr)"/>
  <text x="508" y="352" text-anchor="start" class="signal">rob_tag</text>

  <line class="divider" x1="30" y1="438" x2="770" y2="438"/>

  <text x="45" y="455" class="stage">3 &#183; EXECUTE</text>

  <g>
    <rect class="modbox" x="75"  y="468" width="150" height="75" rx="4"/>
    <text x="150" y="491" text-anchor="middle" class="modname">ALU</text>
    <text x="150" y="509" text-anchor="middle" class="modsub">ADD &#183; SUB &#183; AND</text>
    <text x="150" y="525" text-anchor="middle" class="modsub">OR &#183; XOR &#183; imm</text>
  </g>
  <g>
    <rect class="modbox" x="245" y="468" width="170" height="75" rx="4"/>
    <text x="330" y="491" text-anchor="middle" class="modname">Branch Unit</text>
    <text x="330" y="509" text-anchor="middle" class="modsub">BEQ &#183; BNE &#183; BLT &#183; BGE</text>
    <text x="330" y="525" text-anchor="middle" class="modsub">JAL &#183; JALR &#183; misprediction</text>
  </g>
  <g>
    <rect class="ghostbox" x="435" y="468" width="150" height="75" rx="4"/>
    <text x="510" y="491" text-anchor="middle" class="modname ghosttext">Load/Store Unit</text>
    <text x="510" y="509" text-anchor="middle" class="modsub ghosttext">LB/LH/LW &#183; SB/SH/SW</text>
    <text x="510" y="525" text-anchor="middle" class="modsub ghosttext">stubbed in current build</text>
  </g>

  <line class="arrow" x1="150" y1="423" x2="150" y2="467" marker-end="url(#arr)"/>
  <line class="arrow" x1="330" y1="423" x2="330" y2="467" marker-end="url(#arr)"/>
  <line class="arrow" x1="510" y1="423" x2="510" y2="467" marker-end="url(#arr)"/>
  <text x="245" y="434" text-anchor="middle" class="signal-em">issue when ready</text>

  <line class="arrow" x1="150" y1="543" x2="150" y2="572"/>
  <line class="arrow" x1="330" y1="543" x2="330" y2="572"/>
  <line class="arrow" x1="510" y1="543" x2="510" y2="572"/>
  <line class="arrow" x1="150" y1="572" x2="700" y2="572"/>
  <line class="arrow" x1="700" y1="572" x2="700" y2="540" marker-end="url(#arr)"/>
  <text x="345" y="567" text-anchor="middle" class="signal">alu_value &#183; branch_value &#183; lsu_value (+ rob_tag)</text>

  <line class="divider" x1="30" y1="600" x2="770" y2="600"/>
  <text x="45" y="620" class="stage">4 &#183; COMMIT (in-order)</text>
  <text x="400" y="640" text-anchor="middle" class="commit">When ROB head is valid and rd &#8800; x0, write {commit_rd, commit_value} &#8594; Register File. Single instruction per cycle.</text>
  <text x="400" y="656" text-anchor="middle" class="modsub">Out-of-order execution, in-order commit &#8658; precise exceptions and clean misprediction recovery.</text>

  <text x="400" y="690" text-anchor="middle" class="modsub" font-style="italic">Synthesized: 1,652 standard cells &#183; 0 DRC violations &#183; Sky130 130 nm via OpenLane &#183; 36% higher F_max and 40&#8211;150% IPC vs. in-order baseline.</text>
  <text x="400" y="708" text-anchor="middle" class="modsub" font-style="italic">17 SystemVerilog modules &#183; 15 unit tests + 6 system test programs all passing.</text>

  <text x="695" y="65" text-anchor="middle" class="stage">WB &#183; CDB</text>
  <rect class="cdbbox" x="605" y="78" width="180" height="462" rx="2"/>
  <text transform="rotate(-90, 695, 309)" x="695" y="309" text-anchor="middle" class="cdbtext">Common Data Bus</text>
  <text transform="rotate(-90, 715, 309)" x="715" y="309" text-anchor="middle" class="cdbsub">arbiter priority: Branch &gt; ALU &gt; LSU</text>
  <text transform="rotate(-90, 678, 309)" x="678" y="309" text-anchor="middle" class="cdbsub">{cdb_valid, cdb_tag, cdb_value}</text>

  <line class="arrow-cdb" x1="604" y1="303" x2="586" y2="303" marker-end="url(#arr)"/>
  <text x="601" y="296" text-anchor="end" class="signal-em">write</text>

  <line class="arrow-cdb" x1="604" y1="390" x2="586" y2="390" marker-end="url(#arr)"/>
  <text x="601" y="383" text-anchor="end" class="signal-em">snoop</text>

  <text x="601" y="416" text-anchor="end" class="signal" font-style="italic">also clears matching RAT entries</text>

  <path class="arrow-recov" d="M 415 468 V 450 H 595 V 56 H 145 V 77" marker-end="url(#arrm)"/>
  <text x="595" y="50" text-anchor="end" class="signal" fill="#666">branch_taken &#183; branch_target (misprediction recovery)</text>

</svg>
